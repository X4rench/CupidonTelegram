<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- user-scalable=no убран — TG WebView сам блокирует zoom, а этот атрибут
         на iOS мешает long-press gesture в textarea (для контекстного меню
         Paste). interactive-widget=resizes-content помогает корректной
         работе клавиатуры. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0f0f12" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Cache-busting для Telegram WebView (iOS особенно).
         index.html не кэшируем — он маленький, и в нём ссылки на hash'ed
         bundle (index-XXX.js). Если index.html свежий, новые ссылки на
         бандл тянутся автоматически. Файлы /assets/ TG кэширует как обычно
         по hash в имени — это не мешает. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Купидон — сервис для развития навыков общения</title>
    <meta name="description" content="Купидон — обучающий сервис-ассистент для развития навыков общения. Работает внутри Telegram как мини-приложение. Образовательный и развлекательный характер." />
    <meta property="og:title" content="Купидон — сервис для развития навыков общения" />
    <meta property="og:description" content="Обучающий сервис-ассистент для развития навыков общения. Работает в Telegram как мини-приложение." />
    <meta property="og:type" content="website" />
    <!-- ДИАГНОСТИКА: beacon синхронно при загрузке HTML, до любого JS модуля.
         Если в логах ([client-diag-beacon] stage=html_loaded) нет записей с UA
         iPhone — значит iOS WebView вообще не парсит наш HTML.
         Если есть html_loaded но нет main_started — bundle не парсится.
         Это позволит точно определить где iOS застревает. -->
    <script>
      (function() {
        try {
          var img = new Image();
          img.src = '/api/v1/diag/beacon?stage=html_loaded&ts=' + Date.now()
                  + '&w=' + (window.innerWidth || 0)
                  + '&h=' + (window.innerHeight || 0)
                  + '&tg=' + (window.Telegram ? 'yes' : 'no')
                  + '&tgWA=' + (window.Telegram && window.Telegram.WebApp ? 'yes' : 'no');
        } catch (e) { /* ignore */ }
      })();
    </script>
    <!-- Telegram WebApp script — self-hosted был бы безопаснее (см. DEPLOYMENT_PLAYBOOK §13),
         но для старта подойдёт CDN. Поменяем на self-hosted в Phase L.
         SRI integrity не ставим — TG может обновлять файл, integrity сломает загрузку. -->
    <script src="https://telegram.org/js/telegram-web-app.js" crossorigin="anonymous"></script>
    <script>
      // Второй beacon — после загрузки telegram-web-app.js. Если этот beacon
      // не приходит — CDN telegram.org заблокирован у iOS-юзера (ВПН, оператор).
      (function() {
        try {
          var img = new Image();
          img.src = '/api/v1/diag/beacon?stage=tgjs_loaded'
                  + '&ts=' + Date.now()
                  + '&tgWA=' + (window.Telegram && window.Telegram.WebApp ? 'yes' : 'no')
                  + '&initData=' + (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData ? 'yes' : 'no')
                  + '&platform=' + (window.Telegram && window.Telegram.WebApp ? (window.Telegram.WebApp.platform || 'unk') : 'no-tg');
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Статичный fallback для краулеров без JS (Google Safe Browsing и т.п.):
         реальный контент + юр-данные + ссылки на legal = легит-сигнал.
         Реальные пользователи (JS включён) этот блок НЕ видят — React рендерит
         приложение/лендинг в #root. -->
    <noscript>
      <div style="max-width:720px;margin:40px auto;padding:0 20px;font-family:system-ui,-apple-system,sans-serif;line-height:1.6;color:#1a1a1a;">
        <h1>Купидон</h1>
        <p>Обучающий сервис-ассистент для развития навыков общения. Работает внутри
           мессенджера Telegram как мини-приложение.</p>
        <p>Помогает увереннее вести переписку: разбор диалога, тренажёр общения,
           идеи для сообщений, короткая теория. Сервис носит образовательный
           и развлекательный характер.</p>
        <p><a href="https://t.me/Cupidon_Ai_Bot/app">Открыть в Telegram</a></p>
        <h2>Документы</h2>
        <p>
          <a href="/terms">Условия использования (оферта)</a> &middot;
          <a href="/privacy">Политика конфиденциальности</a>
        </p>
        <h2>Контакты</h2>
        <p>
          Исполнитель: Капустин Роман Денисович, самозанятый (плательщик НПД)<br />
          ИНН: 421212787931<br />
          E-mail: apppartners@mail.ru
        </p>
        <p>&copy; 2026 Капустин Р.&nbsp;Д. Сервис работает в соответствии с законодательством РФ.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
